# Docu AI Search Workflow Feature Or Bugfix With Api Frontend Test And Doc Update

## Action

Follow the feature-or-bugfix-with-api-frontend-test-and-doc-update workflow:
1. Update backend/api.py to implement or fix API logic.
2. Update or add backend tests (backend/tests/test_api.py, backend/tests/test_database.py, backend/tests/test_config_and_edge_cases.py).
3. Update frontend components (frontend/src/components/SettingsModal.jsx, frontend/src/components/SearchView.jsx, frontend/src/components/LibraryView.jsx).
4. Update or add frontend tests (frontend/src/test/SettingsModal.test.jsx).
5. Update documentation (AGENTS.md).

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: backend/api.py, backend/tests/test_api.py, backend/tests/test_database.py

