name: CI

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Backend Tests
      run: python scripts/run_tests.py --quick

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install security tools
      run: pip install bandit pip-audit

    - name: Run Bandit (static security analysis)
      run: bandit -r backend -f json -o bandit-report.json -ll
      continue-on-error: false

    - name: Check for high-severity Bandit findings
      run: |
        python - <<'EOF'
        import json, sys, os
        if not os.path.exists("bandit-report.json"):
            sys.exit(0)
        data = json.load(open("bandit-report.json"))
        highs = [r for r in data.get("results", []) if r.get("issue_severity") in ("HIGH", "CRITICAL")]
        if highs:
            for h in highs:
                print(f"{h['filename']}:{h['line_number']} — {h['issue_text']}")
            sys.exit(1)
        EOF

    - name: Run pip-audit (dependency vulnerability scan)
      run: pip-audit

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json

  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Frontend Tests
      run: npm run test
